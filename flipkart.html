<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flipkart Clone</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f1f3f6;
}

/* Navbar */
.navbar{
    background:#2874f0;
    color:white;
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.search-box input{
    width:400px;
    padding:8px;
    border:none;
}

/* Products */
.container{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:20px;
    padding:20px;
}

.product{
    background:white;
    padding:15px;
    text-align:center;
    border-radius:5px;
}

.product img{
    width:150px;
}

.price{
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">Flipkart</div>

<div class="search-box">
<input type="text" placeholder="Search for products">
</div>

<div>
Login | Cart
</div>
</div>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Smartphone</h3>
<p class="price">₹12,999</p>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Laptop</h3>
<p class="price">₹45,999</p>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Headphones</h3>
<p class="price">₹1,299</p>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Smartwatch</h3>
<p class="price">₹2,499</p>
</div>

</div>

</body>
</html>
